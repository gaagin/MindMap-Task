<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Mind Map Tasks — Интерактивный планировщик</title>
    
    <!-- PWA Meta & Links -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mind Map Tasks" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <script>
      // OAuth implicit callback handler for popup
      if (window.opener && window.location.hash && (window.location.hash.includes('access_token') || window.location.hash.includes('error'))) {
        try {
          window.opener.postMessage({ 
            type: 'GOOGLE_OAUTH_HASH', 
            hash: window.location.hash 
          }, window.location.origin);
          window.close();
        } catch (e) {
          console.error('OAuth callback postMessage failed:', e);
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
